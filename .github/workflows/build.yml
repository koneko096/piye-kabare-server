name: Build and deploy
on:
  push:
    branches: [ master ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/piye-kabare-server

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=master-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          tags: ${{ steps.meta.outputs.tags }}
          push: true
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always() # Upload even if vulnerabilities are found
        with:
          sarif_file: trivy-results.sarif

      - name: Deploy to GCP VM
        uses: appleboy/ssh-action@v1
        env:
          MONGODB_URL: ${{ secrets.MONGODB_URL }}
        with:
          host: ${{ secrets.GCP_VM_HOST }}
          username: ${{ secrets.GCP_VM_USER }}
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          envs: MONGODB_URL
          script: |
            # Login using your GH_PAT for persistent access
            echo "${{ secrets.GH_PAT }}" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin

            # Pull latest and restart
            docker pull ghcr.io/${{ env.IMAGE_NAME }}:latest
            docker stop piye-kabare-server || true
            docker rm piye-kabare-server || true

            # Match the port 8083 from your Dockerfile
            docker run -d \
              --name piye-kabare-server \
              --restart unless-stopped \
              -e MONGODB_URL="$MONGODB_URL" \
              -e NODE_ENV=production \
              -p 8083:8083 \
              ghcr.io/${{ env.IMAGE_NAME }}:latest

            # CRITICAL: Clean up old images to save GCP Free Tier disk space
            docker image prune -f
